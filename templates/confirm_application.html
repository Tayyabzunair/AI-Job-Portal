<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Information | AI Smart Job Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #10b981;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Inter', sans-serif;
            padding: 2rem 0;
        }

        .confirm-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: none;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 3rem;
            max-width: 650px;
            margin: auto;
        }

        .ai-badge {
            background: #eef2ff;
            color: var(--primary);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .form-control {
            border-radius: 12px;
            padding: 0.8rem 1rem;
            border: 2px solid #e5e7eb;
            transition: all 0.3s;
            background: #f9fafb;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            background: white;
        }

        .btn-finalize {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            border: none;
            border-radius: 15px;
            padding: 1rem;
            font-weight: 700;
            color: white;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-finalize:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
            color: white;
        }

        .step-indicator {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e5e7eb;
        }

        .step-dot.active {
            background: var(--primary);
            width: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="confirm-card">
        <div class="text-center mb-4">
            <div class="ai-badge">
                <i class="fas fa-robot"></i> AI-Powered Data Extraction
            </div>
            <h2 class="fw-bold text-dark">Review Your Profile</h2>
            <p class="text-muted">Hamare AI ne aapke resume se ye maloomat nikali hain. Baraye meherbani tasdeeq karein.</p>
        </div>

        <div class="step-indicator justify-content-center">
            <div class="step-dot"></div>
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
        </div>

        <form action="/finalize_application" method="POST">
            <input type="hidden" name="job_id" value="{{ job.id }}">
            <input type="hidden" name="job_skills" value="{{ job.skills }}">
            <input type="hidden" name="filename" value="{{ filename }}">

            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label"><i class="fas fa-user me-2"></i>Full Name</label>
                    <input type="text" name="name" class="form-control" value="{{ details.name }}" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label"><i class="fas fa-envelope me-2"></i>Email Address</label>
                    <input type="email" name="email" class="form-control" value="{{ details.email }}" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label"><i class="fas fa-phone me-2"></i>Phone Number</label>
                    <input type="text" name="phone" class="form-control" value="{{ details.phone }}" required>
                </div>

                <div class="col-md-12 mb-4">
                    <label class="form-label"><i class="fas fa-tools me-2"></i>Extracted Skills</label>
                    <textarea name="skills" class="form-control" rows="4" placeholder="Skills separated by commas...">{{ details.skills }}</textarea>
                    <div class="form-text mt-2"><i class="fas fa-info-circle me-1"></i> Match score inki bunyad par calculate hoga.</div>
                </div>
            </div>

            <button type="submit" class="btn btn-finalize w-100">
                <i class="fas fa-paper-plane me-2"></i> Finalize & Submit Application
            </button>
            
            <div class="text-center mt-3">
                <a href="/candidate_dashboard" class="text-decoration-none small text-muted">
                    <i class="fas fa-arrow-left me-1"></i> Cancel and go back
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
