<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ 'Edit Job' if is_edit else 'Post Job' }} | AI Smart Job Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            padding: 3rem 1rem;
            color: #1e293b;
        }

        .job-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: none;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 3rem;
            max-width: 900px;
            margin: auto;
        }

        .header-section {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header-section i {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .form-label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-label i {
            color: var(--primary);
        }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 0.8rem 1rem;
            border: 2px solid #e5e7eb;
            transition: all 0.3s;
            background: #f9fafb;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            background: white;
            outline: none;
        }

        .btn-post {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border: none;
            border-radius: 15px;
            padding: 1rem 2.5rem;
            font-weight: 700;
            color: white;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-post:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
            color: white;
        }

        .section-divider {
            height: 1px;
            background: #e5e7eb;
            margin: 2rem 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="job-card">
        <div class="header-section">
            <i class="fas fa-briefcase"></i>
            <h2 class="fw-bold">{{ '✏️ Update Job Posting' if is_edit else '🚀 Create New Job Post' }}</h2>
            <p class="text-muted">Apni requirements darj karein taake AI sahi candidates match kar sakay.</p>
        </div>

        <form action="{{ url_for('edit_job', id=job.id) if is_edit else url_for('post_job') }}" method="POST">
            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label"><i class="fas fa-heading"></i> Job Title</label>
                    <input type="text" name="title" class="form-control" value="{{ job.title if is_edit else '' }}" placeholder="e.g. Python Developer" required>
                </div>
                
                <div class="col-md-6">
                    <label class="form-label"><i class="fas fa-layer-group"></i> Job Type / Level</label>
                    <select name="job_type" class="form-select">
                        <option value="Internship" {{ 'selected' if is_edit and job.job_type == 'Internship' }}>Internship</option>
                        <option value="Junior Level" {{ 'selected' if is_edit and job.job_type == 'Junior Level' }}>Junior Level</option>
                        <option value="Mid Level" {{ 'selected' if is_edit and job.job_type == 'Mid Level' }}>Mid Level</option>
                        <option value="Senior Level" {{ 'selected' if is_edit and job.job_type == 'Senior Level' }}>Senior Level</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label"><i class="fas fa-map-marker-alt"></i> Location</label>
                    <input type="text" name="location" class="form-control" value="{{ job.location if is_edit else '' }}" placeholder="City or Remote" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label"><i class="fas fa-money-bill-wave"></i> Salary Range</label>
                    <input type="text" name="salary" class="form-control" value="{{ job.salary if is_edit else '' }}" placeholder="e.g. 50k - 80k" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label"><i class="fas fa-calendar-alt"></i> Deadline</label>
                    <input type="date" name="deadline" class="form-control" value="{{ job.deadline if is_edit else '' }}" required>
                </div>

                <div class="section-divider"></div>

                <div class="col-12">
                    <label class="form-label"><i class="fas fa-tags"></i> Required Skills (Comma separated)</label>
                    <input type="text" name="skills" class="form-control" value="{{ job.skills if is_edit else '' }}" placeholder="e.g. Python, Flask, SQL, Git" required>
                </div>

                <div class="col-12">
                    <label class="form-label"><i class="fas fa-file-alt"></i> Job Requirements / Description</label>
                    <textarea name="requirements" class="form-control" rows="4" placeholder="Detail qualifications and expectations..." required>{{ job.requirements if is_edit else '' }}</textarea>
                </div>

                <div class="col-12">
                    <label class="form-label"><i class="fas fa-tasks"></i> Key Responsibilities</label>
                    <textarea name="responsibilities" class="form-control" rows="4" placeholder="Day-to-day tasks and responsibilities..." required>{{ job.responsibilities if is_edit else '' }}</textarea>
                </div>

                <div class="col-12">
                    <label class="form-label"><i class="fas fa-gift"></i> Benefits & Perks (Optional)</label>
                    <textarea name="benefits" class="form-control" rows="3" placeholder="e.g. Health Insurance, Remote Work, Bonuses...">{{ job.benefits if is_edit and job.benefits else '' }}</textarea>
                </div>

                <div class="col-12 text-center mt-5">
                    <button type="submit" class="btn btn-post">
                        {{ 'Update Job Details' if is_edit else '🚀 Post Job Now' }}
                    </button>
                    <div class="mt-3">
                        <a href="/candidates" class="text-decoration-none text-muted small"><i class="fas fa-arrow-left me-1"></i> Back to Dashboard</a>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
