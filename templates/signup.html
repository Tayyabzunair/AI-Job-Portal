<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | AI Smart Job Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --bg-dark: #0f172a;
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Background Glow */
        .glow-sphere {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            z-index: -1;
            top: -10%;
            right: -10%;
        }

        .signup-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            padding: 0.75rem 1.2rem;
            transition: all 0.3s;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            color: white;
        }

        .form-select option {
            background: #1e293b;
            color: white;
        }

        .btn-signup {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border: none;
            border-radius: 12px;
            padding: 0.8rem;
            font-weight: 700;
            margin-top: 1rem;
            transition: 0.3s;
        }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
        }

        .login-link {
            color: #94a3b8;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link:hover { color: var(--primary); }

        .input-icon-group {
            position: relative;
        }

        .input-icon-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }

        .input-icon-group .form-control {
            padding-left: 45px;
        }
    </style>
</head>
<body>
    <div class="glow-sphere"></div>
    
    <div class="signup-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold" style="letter-spacing: -1px;">Join AI Portal</h2>
            <p class="small text-muted">Create your account to start your journey.</p>
        </div>

        <form action="/signup" method="POST">
            <div class="mb-3 input-icon-group">
                <i class="fas fa-user"></i>
                <input type="text" name="name" class="form-control" placeholder="Full Name" required>
            </div>

            <div class="mb-3 input-icon-group">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" class="form-control" placeholder="Email Address" required>
            </div>

            <div class="mb-3 input-icon-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-semibold text-muted mb-2">I want to...</label>
                <select name="role" class="form-select" required>
                    <option value="Candidate">Find a Dream Job (Candidate)</option>
                    <option value="Owner">Post and Hire (Owner)</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary btn-signup w-100">
                Create Account <i class="fas fa-user-plus ms-2"></i>
            </button>
        </form>

        <div class="text-center mt-4">
            <p class="small text-muted">
                Already have an account? <a href="/" class="login-link">Sign In</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
