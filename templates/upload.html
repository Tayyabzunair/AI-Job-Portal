<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume | AI Smart Job Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
        }

        .upload-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 3rem;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 20px;
            padding: 3rem 2rem;
            background: #f8fafc;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            margin-bottom: 2rem;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: #f1f5f9;
        }

        .upload-icon {
            font-size: 3.5rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }

        .file-input {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }

        .btn-upload {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border: none;
            border-radius: 15px;
            padding: 1rem 2.5rem;
            font-weight: 700;
            color: white;
            transition: all 0.3s;
            width: 100%;
        }

        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            color: white;
        }

        .job-context-badge {
            background: #eef2ff;
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 2rem;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="upload-container">
        <div class="job-context-badge">
            <i class="fas fa-briefcase me-2"></i> Applying for: {{ job.title }}
        </div>
        
        <h2 class="fw-bold mb-2">Upload Your Resume</h2>
        <p class="text-muted mb-4">Hamara AI aapke resume se data extract karega taake form khud-ba-khud fill ho jaye.</p>

        <form action="/apply/{{ job.id }}" method="POST" enctype="multipart/form-data">
            <div class="upload-area" id="drop-area">
                <div class="upload-icon">
                    <i class="fas fa-cloud-upload-alt"></i>
                </div>
                <h5 class="fw-bold mb-1">Click or Drag PDF Here</h5>
                <p class="small text-muted mb-0">Only PDF files are supported (Max 10MB)</p>
                <input type="file" name="resume" class="file-input" id="file-input" accept=".pdf" required>
            </div>
            
            <div id="file-name-display" class="mb-3 fw-bold text-primary small"></div>

            <button type="submit" class="btn btn-upload">
                <i class="fas fa-magic me-2"></i> Start AI Analysis
            </button>
        </form>

        <div class="mt-4 pt-3 border-top">
            <a href="/candidate_dashboard" class="text-decoration-none text-muted small">
                <i class="fas fa-arrow-left me-1"></i> Back to Jobs List
            </a>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const display = document.getElementById('file-name-display');
    const dropArea = document.getElementById('drop-area');

    fileInput.addEventListener('change', function() {
        if(this.files[0]) {
            display.innerHTML = `<i class="fas fa-file-pdf me-2"></i> Selected: ${this.files[0].name}`;
            dropArea.style.borderColor = "#4f46e5";
            dropArea.style.background = "#eef2ff";
        }
    });
</script>

</body>
</html>
